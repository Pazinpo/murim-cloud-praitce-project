<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강호전기 (江湖傳記)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Noto Serif KR', serif; background: #0a0a0a; overflow: hidden; }
        .wuxia-bg {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://ai.google.dev/generated-assets/c57c50a0-0692-4168-9104-c36b6d2e0520.png'); /* 십만대산 진짜 배경 주소 적용! */
            background-size: cover; 
            background-position: center;
        }
        .menu-btn {
            transition: all 0.3s;
            background: rgba(45, 45, 45, 0.8);
            border-left: 4px solid #d4af37;
        }
        .menu-btn:hover {
            background: #d4af37; color: black; padding-left: 2rem; transform: scale(1.05);
        }
        .gold-glow { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body class="wuxia-bg h-screen flex items-center justify-center">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [status, setStatus] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            const startGame = () => {
                setLoading(true);
                fetch('/api/status')
                    .then(res => res.json())
                    .then(data => {
                        setStatus(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        alert("마교의 결계가 강해 정보를 불러올 수 없습니다!");
                        setLoading(false);
                    });
            };

            return (
                <div class="w-full max-w-4xl px-10 flex flex-col md:flex-row items-center justify-between">
                    {/* 왼쪽: 게임 타이틀 및 메뉴 */}
                    <div class="text-left space-y-8">
                        <header>
                            <h2 class="text-yellow-600 text-2xl font-bold tracking-widest italic gold-glow">강호의 기록</h2>
                            <h1 class="text-white text-7xl font-extrabold mt-2">강호전기<span class="text-yellow-500 text-4xl block mt-1">(江湖傳記)</span></h1>
                        </header>

                        <nav class="flex flex-col space-y-4 w-64">
                            <button onClick={startGame} class="menu-btn text-white text-xl py-3 px-6 text-left font-bold italic">
                                {loading ? "내공 주입 중..." : "게임 시작"}
                            </button>
                            <button class="menu-btn text-white text-xl py-3 px-6 text-left font-bold opacity-50 cursor-not-allowed italic">환경 설정</button>
                            <button class="menu-btn text-white text-xl py-3 px-6 text-left font-bold opacity-50 cursor-not-allowed italic">강호 탈출</button>
                        </nav>
                    </div>

                    {/* 오른쪽: 캐릭터 정보창 (데이터가 있을 때만 등장) */}
                    <div class={`transition-all duration-1000 ${status ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-20'}`}>
                        {status && (
                            <div class="bg-black/80 border-2 border-yellow-600 p-8 rounded-sm shadow-2xl w-80 relative">
                                <div class="absolute -top-4 -left-4 bg-yellow-600 text-black px-3 py-1 font-bold text-sm italic">CHARACTER INFO</div>
                                <div class="space-y-6">
                                    <div class="border-b border-yellow-900 pb-2">
                                        <p class="text-yellow-600 text-xs italic">NAME</p>
                                        <p class="text-white text-2xl font-bold italic underline decoration-yellow-600 underline-offset-8">{status.name}</p>
                                    </div>
                                    <div class="border-b border-yellow-900 pb-2">
                                        <p class="text-yellow-600 text-xs italic">CLAN</p>
                                        <p class="text-white text-xl font-bold italic">{status.school}</p>
                                    </div>
                                    <div>
                                        <p class="text-yellow-600 text-xs italic">SECRET SKILL</p>
                                        <p class="text-yellow-400 text-lg font-bold italic">{status.skill}</p>
                                    </div>
                                </div>
                                <div class="mt-8 flex justify-center">
                                    <div class="w-full h-1 bg-yellow-900 overflow-hidden">
                                        <div class="w-2/3 h-full bg-yellow-500 shadow-[0_0_10px_#d4af37]"></div>
                                    </div>
                                </div>
                                <p class="text-yellow-900 text-[10px] mt-2 text-center tracking-[0.2em] italic">MURIM CLOUD SYSTEM ONLINE</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
