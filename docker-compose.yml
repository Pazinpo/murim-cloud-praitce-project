services:
  # 1. DB 설정 (기존과 동일)
  my-db:
    image: mariadb:latest
    container_name: murim-db
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - ./my_db_data:/var/lib/mysql

  # 2. 백엔드 이름 변경 (arpia-backend -> murim-backend)
  murim-backend:
    image: python:3.9-slim
    container_name: murim-backend
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn pymysql && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      - DB_HOST=murim-db
      - DB_PASSWORD=1234
    depends_on:
      - my-db

  # 3. 웹 서버 설정
  my-web:
    image: nginx:latest
    container_name: murim-web
    ports:
      - "8085:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - murim-backend
