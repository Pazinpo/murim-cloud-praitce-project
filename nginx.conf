events {}
http {
    server {
        listen 80;
        # 1. 일반 접속은 프론트엔드 HTML을 보여줌
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        # 2. /api/ 로 시작하는 요청은 백엔드 컨테이너로 토스!
        location /api/ {
            proxy_pass http://murim-backend:8000;
        }
    }
}
